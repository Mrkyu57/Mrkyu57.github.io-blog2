<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body { font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif; line-height: 1.6; max-width: 700px; margin: 0 auto; padding: 50px 20px; color: #444; }
        nav { margin-bottom: 50px; }
        nav a { text-decoration: none; color: #333; font-weight: bold; font-size: 1.2rem; }
        footer { margin-top: 100px; color: #aaa; font-size: 0.8rem; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    </nav>

    {{ content }}

    <footer>
        <p>© {{ site.time | date: '%Y' }} 직접 만든 블로그</p>
    </footer>
</body>
</html>
